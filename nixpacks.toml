[phases.setup]
nixpkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.json", "php83Extensions.tokenizer", "php83Extensions.curl", "php83Extensions.fileinfo", "php83Extensions.bcmath", "php83Extensions.gd", "php83Packages.composer", "nodejs_20"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan view:cache && php-fpm"
